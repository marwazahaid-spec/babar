<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <h1>My Online Shop</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Banner -->
    <section class="banner">
        <h2>Welcome to Our Store</h2>
        <p>Best Products at Best Price</p>
    </section>

    <!-- Products -->
    <section class="products">

        <div class="card">
            <img src="https://via.placeholder.com/200" alt="">
            <h3>Shoes</h3>
            <p>Price: $50</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200" alt="">
            <h3>Watch</h3>
            <p>Price: $30</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200" alt="">
            <h3>Bag</h3>
            <p>Price: $40</p>
            <button>Buy Now</button>
        </div>

    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 My Online Shop</p>
    </footer>

</body>
</html>
